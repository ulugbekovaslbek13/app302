<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Aslbek | Image Gallery</title>
    <style>
        body { 
            background: #000; color: white; font-family: 'Arial', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; 
        }
        .main-img-container {
            width: 500px; height: 300px; border: 5px solid #333;
            border-radius: 15px; overflow: hidden; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        #mainImg { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .thumbnails { display: flex; gap: 10px; }
        .thumb { 
            width: 80px; height: 60px; border-radius: 8px; cursor: pointer; 
            opacity: 0.6; transition: 0.3s; object-fit: cover; border: 2px solid transparent;
        }
        .thumb:hover, .active { opacity: 1; border-color: #00ff88; transform: scale(1.1); }
        h1 { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    </style>
</head>
<body>

    <h1>Mening Galereyam</h1>

    <div class="main-img-container">
        <img id="mainImg" src="https://picsum.photos/id/10/500/300" alt="Main">
    </div>

    <div class="thumbnails">
        <img class="thumb active" src="https://picsum.photos/id/10/80/60" onclick="changeImg(this, 10)">
        <img class="thumb" src="https://picsum.photos/id/20/80/60" onclick="changeImg(this, 20)">
        <img class="thumb" src="https://picsum.photos/id/30/80/60" onclick="changeImg(this, 30)">
        <img class="thumb" src="https://picsum.photos/id/40/80/60" onclick="changeImg(this, 40)">
        <img class="thumb" src="https://picsum.photos/id/50/80/60" onclick="changeImg(this, 50)">
    </div>

    <script>
        function changeImg(element, id) {
            // Asosiy rasmni o'zgartirish
            const mainImg = document.getElementById('mainImg');
            mainImg.style.opacity = 0;
            
            setTimeout(() => {
                mainImg.src = `https://picsum.photos/id/${id}/500/300`;
                mainImg.style.opacity = 1;
            }, 300);

            // Aktiv klassni boshqarish
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
